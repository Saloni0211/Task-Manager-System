# 1. DYNAMIC PORT BINDING (Critical for Railway)
# This tells Spring to listen to the port Railway provides, defaulting to 8080 locally.
server.port=${PORT:8080}

# 2. DATABASE CONFIGURATION
# We use placeholders ${VAR_NAME} to fetch values from your Railway Variables tab.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / HIBERNATE SETTINGS
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. JWT CONFIGURATION
# Fetching the secret you already added in your dashboard
jwt.secret=${JWT_SECRET}
# 24 hours in milliseconds
jwt.expiration=86400000